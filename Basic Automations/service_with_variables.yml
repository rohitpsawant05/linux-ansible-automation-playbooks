---
- name: Install and start web server
  hosts: webservers
  become: yes
  vars:
    package_name: nginx
    service_name: nginx
  tasks:
    - name: Install nginx
      package:
        name: "{{ package_name }}"
        state: present
    - name: Start nginx service
      service:
        name: "{{ service_name }}"
        state: started
        enabled: yes
